name: Deploy Laravel ke Azure Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, zip
          coverage: none

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev --no-progress --prefer-dist

      - name: 📦 Install NPM & Build Assets
        run: |
          npm ci
          npm run build

      - name: 🏗️ Create Deployment Package
        run: |
          mkdir -p deployment-package
          # Salin folder utama Laravel
          cp -r app bootstrap config database public resources routes storage deployment-package/
          # Salin file konfigurasi dasar
          cp artisan composer.json composer.lock deployment-package/
          # Salin vendor (wajib untuk Laravel)
          cp -r vendor deployment-package/

          # Pastikan struktur folder storage lengkap
          mkdir -p deployment-package/storage/framework/{sessions,views,cache}
          mkdir -p deployment-package/storage/logs
          mkdir -p deployment-package/bootstrap/cache

          # Atur permission agar Azure bisa menulis ke folder tersebut
          chmod -R 775 deployment-package/storage deployment-package/bootstrap/cache

      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'manajemen-klinik-staging'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_STAGING }}
          package: deployment-package
